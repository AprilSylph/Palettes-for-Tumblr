name: Update Palette System Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *" # monthly

permissions:
  contents: write
  pull-requests: write

jobs:
  update-palette-system-data:
    name: Update Palette System Data
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Run update script
        run: dev/update-palette-system-data.js

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'chore: update palette system data'
          author: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          branch: automatic-palette-system-update
          title: 'chore: update palette system data'
          body: |
            Updates the palette system data for Tumblr's native palettes.
            <sub>This pull request is autogenerated by the "Update Palette System Data" GitHub action.</sub>
